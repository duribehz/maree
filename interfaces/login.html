<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MARÉE - Ingreso de Celular</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3a3633", // Deep Charcoal Black from palette
                        secondary: "#eddcd9", // Pale Pink from palette
                        accent: "#6e96ab", // Steel Blue from palette
                        neutral: "#cdcbb6", // Sand Beige from palette
                        "background-light": "#fdfbf7", // Very light off-white/sand for light mode background
                        "background-dark": "#2c2a28", // Darker version of charcoal for dark mode background
                    },
                    fontFamily: {
                        display: ["'Playfair Display'", "serif"], // Elegant serif for headings
                        sans: ["'Lato'", "sans-serif"], // Clean sans for body
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                    },
                },
            },
        };
    </script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&amp;family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-300">
<div class="w-full max-w-md bg-white dark:bg-[#3a3633] shadow-xl rounded-lg overflow-hidden border border-neutral/30 dark:border-neutral/10">
<div class="pt-12 pb-8 px-8 text-center">
<h1 class="font-display text-5xl tracking-widest text-primary dark:text-secondary mb-3 uppercase">Marée</h1>
<div class="flex items-center justify-center gap-2 text-primary dark:text-neutral/80 text-xs tracking-[0.2em] font-light uppercase">
<span class="w-4 h-[1px] bg-primary dark:bg-neutral/80"></span>
<span>Love at first crêpe</span>
<span class="w-4 h-[1px] bg-primary dark:bg-neutral/80"></span>
</div>
</div>
<div class="px-8 pb-12">
<h2 class="text-xl font-display text-primary dark:text-white text-center mb-2">Bienvenido</h2>
<p class="text-center text-accent dark:text-accent/80 text-sm mb-8 font-sans font-light">
                Te enviaremos un código de verificación por WhatsAppp
            </p>
<form action="#" class="space-y-6">
<div class="relative group">
<label class="block text-xs font-bold text-primary dark:text-neutral uppercase tracking-wider mb-2" for="phone">Número de Celular</label>
<div class="flex shadow-sm">
<span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-primary/30 dark:border-neutral/30 bg-secondary/20 dark:bg-black/20 text-primary dark:text-neutral text-sm">
                            🇲🇽 +52
                        </span>
<input class="flex-1 block w-full rounded-none rounded-r-md border-primary/30 dark:border-neutral/30 bg-transparent text-primary dark:text-white placeholder-primary/40 dark:placeholder-neutral/40 focus:ring-accent focus:border-accent sm:text-sm py-3 px-4 font-sans tracking-wide transition-colors" id="phone" name="phone" placeholder="55 1234 5678" type="tel"/>
</div>
</div>
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold uppercase tracking-widest text-secondary bg-primary hover:bg-opacity-90 dark:bg-neutral dark:text-primary dark:hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent transition-all duration-300 mt-8" type="submit">
<span>Enviar Código</span>
<span class="material-icons ml-2 text-sm">arrow_forward</span>
</button>
</form>
<div class="mt-8 flex justify-center">
<div class="w-16 h-1 bg-secondary rounded-full opacity-50"></div>
</div>
</div>
<div class="bg-secondary/20 dark:bg-black/20 py-4 text-center border-t border-neutral/20 dark:border-white/5">
<a class="text-xs text-primary/70 dark:text-neutral/60 hover:text-accent dark:hover:text-white transition-colors" href="#">
                ¿Necesitas ayuda? Contáctanos
            </a>
</div>
</div>
</body></html>
